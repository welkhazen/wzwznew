name: Secret Scan

on:
  pull_request:
    branches: [preview, main]
  push:
    branches: [preview, main]

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Install Gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - name: Scan working tree for secrets
        run: npm run secrets:scan
