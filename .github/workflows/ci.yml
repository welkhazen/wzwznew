name: PR CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Install, lint, build, and test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        # Bare `tsc --noEmit` against the solution tsconfig (files: []) checks
        # nothing. Run each referenced project explicitly so app + node code is
        # actually type-checked.
        run: |
          npx tsc -p tsconfig.app.json --noEmit
          npx tsc -p tsconfig.node.json --noEmit

      - name: Lint
        run: npx eslint api server src --max-warnings=0

      - name: Build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: dummy
        run: npm run build

      - name: Unit tests
        run: npm run test

      - name: Server tests
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: dummy
          # These are throwaway CI values, not real secrets. Lengths must clear
          # the env schema minimums (SESSION_SECRET/PHONE_HMAC_KEY >= 32,
          # AUTH_PASSWORD_PEPPER >= 16) or server/config/env.ts exits on import.
          SESSION_SECRET: ci-session-secret-ci-session-secret-32chars
          PHONE_HMAC_KEY: ci-phone-hmac-key-ci-phone-hmac-key-32chars
          AUTH_PASSWORD_PEPPER: ci-password-pepper-16
        run: npm run test:server
