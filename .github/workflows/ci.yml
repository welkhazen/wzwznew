name: PR CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Install, lint, build, and test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint api components server src --max-warnings=0

      - name: Build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: dummy
        run: npm run build

      - name: Unit tests
        run: npm run test

      - name: Server tests
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: dummy
          SESSION_SECRET: ci-session-secret
          PHONE_HMAC_KEY: ci-phone-hmac-key
          AUTH_PASSWORD_PEPPER: ci-password-pepper
        run: npm run test:server
