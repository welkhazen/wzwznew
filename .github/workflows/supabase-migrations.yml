name: Supabase migrations

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"

jobs:
  preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: List pending migration files
        id: list
        run: |
          {
            echo 'sql<<MIGRATION_EOF'
            for f in supabase/migrations/*.sql; do
              [ -e "$f" ] || continue
              echo "-- $f"
              cat "$f"
              echo
            done
            echo 'MIGRATION_EOF'
          } >> "$GITHUB_OUTPUT"
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: supabase-migrations
          message: |
            ### Supabase migrations in this PR
            The following SQL will run on merge to `main`:
            <details><summary>Show SQL</summary>

            ```sql
            ${{ steps.list.outputs.sql }}
            ```
            </details>

  apply:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
      - name: Push migrations
        run: supabase db push
