<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="raW icon">
  <!-- Background -->
  <rect width="512" height="512" fill="#0c0c0c"/>

  <!-- Outer gold ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#F1C42D" stroke-width="18"/>

  <!-- Inner silver ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#c0c0c0" stroke-width="12"/>

  <!-- Center sphere/core -->
  <circle cx="256" cy="256" r="140" fill="#1a1a1a"/>

  <!-- Gradient overlay for depth -->
  <defs>
    <radialGradient id="sphereGradient" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#333333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F1C42D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4a017;stop-opacity:1" />
    </linearGradient>
  </defs>

  <circle cx="256" cy="256" r="140" fill="url(#sphereGradient)"/>

  <!-- Central geometric element -->
  <circle cx="256" cy="256" r="80" fill="none" stroke="url(#accentGradient)" stroke-width="8"/>

  <!-- Inner accent lines -->
  <line x1="256" y1="176" x2="256" y2="120" stroke="#F1C42D" stroke-width="6" stroke-linecap="round"/>
  <line x1="256" y1="336" x2="256" y2="392" stroke="#F1C42D" stroke-width="6" stroke-linecap="round"/>
  <line x1="176" y1="256" x2="120" y2="256" stroke="#F1C42D" stroke-width="6" stroke-linecap="round"/>
  <line x1="336" y1="256" x2="392" y2="256" stroke="#F1C42D" stroke-width="6" stroke-linecap="round"/>
</svg>
