# yaml-language-server: $schema=https://raw.githubusercontent.com/breferrari/shardmind/main/schemas/shard-schema.schema.json

schema_version: 1

# ---------------------------------------------------------------------------
# Values — what goes inside files.
# Four questions. One TUI screen. Done in 30 seconds.
#
# Every value declares a `default` (Invariant 1: defaults must produce a
# vault byte-equivalent to `git clone`). `required: true` here pairs with
# an empty default — the engine only runs the `personalize` hook when values
# are non-default (Invariant 2, engine-enforced), so an all-defaults install
# never touches North Star. The personalize hook keeps a secondary guard for
# an empty `user_name` (non-default via some other value), so an unset name
# still leaves managed files untouched.
# ---------------------------------------------------------------------------

values:
  user_name:
    type: string
    required: true
    message: "Your name"
    placeholder: "Jane Engineer"
    default: ""
    group: setup

  org_name:
    type: string
    message: "Organization (or 'Independent')"
    default: "Independent"
    group: setup

  vault_purpose:
    type: select
    required: true
    message: "How will you use this vault?"
    hint: "Chooses the primary lens. You can edit this later in shard-values.yaml."
    options:
      - { value: engineering, label: "Engineering",  description: "Projects, incidents, decisions, reviews" }
      - { value: research,    label: "Research",     description: "Sources, findings, hypotheses, wiki" }
      - { value: freelance,   label: "Freelance",    description: "Clients, projects, milestones" }
      - { value: general,     label: "General",      description: "Flexible knowledge work" }
    default: engineering
    group: setup

  qmd_enabled:
    type: boolean
    message: "Enable QMD semantic search?"
    default: true
    hint: "Requires: npm install -g @tobilu/qmd"
    group: setup

groups:
  - id: setup
    label: "Quick Setup"
    description: "Four questions. Press Enter after each."

# ---------------------------------------------------------------------------
# Modules — what files exist.
#
# Eleven modules in three tiers:
#
#   * 5 always-on modules (`removable: false`): the 4 content spines —
#     brain, work, reference, thinking — plus claude. Claude is the
#     canonical agent layer: every per-feature module gates files under
#     `.claude/{agents,commands}/` (e.g. `org.agents: ["people-profiler"]`
#     gates `.claude/agents/people-profiler.md`), and Codex + Gemini's
#     hook configs reference `${*_PROJECT_DIR:-.}/.claude/scripts/...`.
#     Deselecting Claude would orphan every cross-module gating reference
#     and break Codex/Gemini's hook resolution. Codex and Gemini are
#     additive integrations layered on top of the Claude infra.
#   * 4 removable content modules: org, perf, incidents, one_on_ones.
#     Deselected modules drop their paths AND their per-name commands /
#     agents under `.claude/{commands,agents}/`.
#   * 2 removable agent modules: codex, gemini. Deselect to omit
#     AGENTS.md / GEMINI.md and the matching dotfolder contents.
#     `.claude/scripts/` (shared hook implementations) stays always-on
#     by virtue of being claimed by no module.
#
# Bases (`bases/*.base`) are listed by exact path under their owning
# module's `paths` — the engine's `mod.bases` field only matches
# `.base.njk` (see ShardMind source/core/modules.ts §classifyModule),
# and obsidian-mind's bases ship as plain `.base`.
# ---------------------------------------------------------------------------

modules:
  brain:
    label: "Operational memory — Memories, Decisions, Patterns, Gotchas, North Star, Skills"
    paths: ["brain/"]
    removable: false

  work:
    label: "Active projects, archive, meetings"
    paths:
      - "work/Index.md"
      - "work/active/"
      - "work/archive/"
      - "work/meetings/"
      - "bases/Work Dashboard.base"
    commands: ["om-meeting", "om-intake", "om-project-archive"]
    removable: false

  reference:
    label: "Codebase knowledge, architecture maps, runbooks"
    paths: ["reference/"]
    removable: false

  thinking:
    label: "Scratchpad for drafts and reasoning"
    paths: ["thinking/"]
    removable: false

  org:
    label: "People and teams — who you work with"
    paths:
      - "org/"
      - "bases/People Directory.base"
    agents: ["people-profiler"]
    removable: true

  perf:
    label: "Performance — brag doc, competencies, reviews, PR evidence"
    paths:
      - "perf/"
      - "bases/Competency Map.base"
      - "bases/Review Evidence.base"
    commands: ["om-peer-scan", "om-review-brief", "om-self-review", "om-review-peer", "om-slack-scan"]
    agents: ["brag-spotter", "review-fact-checker", "review-prep"]
    removable: true

  incidents:
    label: "Incident tracking — outages, RCAs, deep dives"
    paths:
      - "work/incidents/"
      - "bases/Incidents.base"
    commands: ["om-incident-capture"]
    agents: ["slack-archaeologist"]
    removable: true

  one_on_ones:
    label: "1:1 meeting notes"
    paths:
      - "work/1-1/"
      - "bases/1-1 History.base"
    commands: ["om-capture-1on1", "om-prep-1on1"]
    removable: true

  claude:
    label: "Claude (Anthropic) agent — CLAUDE.md, .claude/agents, .claude/skills, .claude/commands, .claude-plugin"
    paths:
      - "CLAUDE.md"
      - ".claude/agents/"
      - ".claude/skills/"
      - ".claude/commands/"
      - ".claude/memory-template.md"
      - ".claude/settings.json"
      - ".claude/update-skills.ts"
      - ".claude-plugin/"
    agents: ["claude"]
    # Always-on. Per-feature modules (org/perf/incidents/one_on_ones) gate
    # files under `.claude/{agents,commands}/` via their `agents:` /
    # `commands:` fields; Codex + Gemini hook configs reference
    # `${*_PROJECT_DIR:-.}/.claude/scripts/...`. Deselecting Claude would
    # orphan every cross-module gating reference and break the other two
    # agents' hook resolution.
    removable: false

  codex:
    label: "Codex (OpenAI) agent — AGENTS.md, .codex/"
    paths:
      - "AGENTS.md"
      - ".codex/"
    agents: ["codex"]
    removable: true

  gemini:
    label: "Gemini (Google) agent — GEMINI.md, .gemini/"
    paths:
      - "GEMINI.md"
      - ".gemini/"
    agents: ["gemini"]
    removable: true

# ---------------------------------------------------------------------------
# Signals — classification contract.
#
# This block is the spec / source-of-truth for which signals the vault
# recognizes and where each one routes. Each signal lists a description
# (what the hook is looking for) plus a `routes_to` field (where the
# resulting capture should land). Module-gated signals are skipped when
# their module is excluded.
#
# The runtime consumer is `.claude/scripts/classify-message.ts`. As of
# obsidian-mind v5.1 the multilingual regex tables live in
# `.claude/scripts/lib/signals.ts` and the classifier reads them
# directly — not from this schema. Keep the two in sync when adding or
# removing a signal: the schema entry (here) and the implementation
# (`.claude/scripts/lib/signals.ts`) describe the same surface.
# ---------------------------------------------------------------------------

signals:
  - id: DECISION
    description: "A choice was made with reasoning"
    routes_to: "work/active/ or work/Index.md Decisions Log; brain/Key Decisions.md if significant"
    core: true

  - id: WIN
    description: "Achievement, praise, milestone, or delivery"
    routes_to: "perf/Brag Doc.md with a link to the evidence note"
    module: perf

  - id: ARCHITECTURE
    description: "System design, technical structure, decision record"
    routes_to: "reference/ or work/active/<project>/decisions/"
    core: true

  - id: PROJECT_UPDATE
    description: "Status update, delivery, roadmap shift on active work"
    routes_to: "work/active/<project>/ note or work/Index.md"
    core: true

  - id: INCIDENT
    description: "Outage, pager, severity event, postmortem material"
    routes_to: "work/incidents/ — consider /om-incident-capture"
    module: incidents

  - id: PERSON_CONTEXT
    description: "Information about someone you work with"
    routes_to: "org/people/<person>.md"
    module: org

  - id: ONE_ON_ONE
    description: "1:1 meeting content — takeaways, feedback, action items"
    routes_to: "work/1-1/<Person> YYYY-MM-DD.md and org/people/<person>.md"
    module: one_on_ones

# ---------------------------------------------------------------------------
# Frontmatter — per-note-type validation rules consumed by the PostToolUse
# validate-write hook. Shorthand `key: [a, b]` expands to `key: { required: [...] }`.
# `path_match` uses shell-glob (single-segment *, cross-segment **); omit to
# infer note type from parent folder.
# ---------------------------------------------------------------------------

frontmatter:
  global: [date, description, tags]

  work-note:
    required: [date, status, quarter]
    path_match: "work/active/**.md"

  incident:
    required: [date, status, quarter, ticket, severity, role]
    path_match: "work/incidents/**.md"

  1-1:
    required: [date, quarter]
    path_match: "work/1-1/*.md"

  person:
    required: [date, title]
    path_match: "org/people/*.md"

  team:
    required: [date]
    path_match: "org/teams/*.md"

  brain-note:
    required: [date, description]
    path_match: "brain/*.md"

# ---------------------------------------------------------------------------
# Migrations — value migrations between shard versions.
# v6.0.0 is the first shardmind-native release; no prior shard-values.yaml
# exists to migrate. Users on obsidian-mind v5.x or earlier run
# `/om-vault-upgrade` inside an installed v6 vault to migrate their content.
# ---------------------------------------------------------------------------

migrations: []
