title: obsidian-second-brain
description: >-
  A 44-command cross-CLI skill that turns any Obsidian vault into a living
  AI-first second brain. Runs in Claude Code, OpenAI Codex CLI, Google Gemini
  CLI, and OpenCode from one platform-neutral source. Vault management,
  thinking tools, scheduled agents, key-less web research, Google Calendar
  commands, and /obsidian-architect - which scans a codebase and writes
  maintained architecture notes into your vault. Plus a write-time AI-first
  validator hook and an interview-driven /create-command flow.
theme: jekyll-theme-cayman
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# SEO
url: https://eugeniughelbur.github.io
baseurl: /obsidian-second-brain
twitter:
  username: eugeniughelbur
  card: summary_large_image
social:
  name: Eugeniu Ghelbur
  links:
    - https://github.com/eugeniughelbur
    - https://www.linkedin.com/in/eugeniu-ghelbur/

# Don't ship internal docs as pages
exclude:
  - .venv
  - __pycache__
  - scripts
  - .env*
  - install.sh
  - pyproject.toml
  - uv.lock
  - .gitignore
  - CITATION.cff
  - SKILL.md
  - architecture.md
  - hooks
  - commands
  - references
